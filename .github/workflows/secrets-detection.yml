name: Reusable Secrets Detection

on:
  workflow_call:
    secrets:
      GITLEAKS_LICENSE:
        required: true
        description: "Gitleaks license key for authentication"
      SLACK_TECH_WEBHOOK:
        required: false
        description: "Slack webhook URL for security notifications"
    inputs:
      slack_channel:
        description: "Slack channel to send notifications to"
        required: false
        type: string
        default: "buzz-security"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gitleaks:
    name: Detect Secrets with Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for comprehensive scanning across entire repository

      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_NOTIFY_USER_LIST: "@${{ github.actor }}"

      - name: Verify leak findings
        id: verify_leaks
        if: steps.gitleaks.outcome == 'failure'
        run: |
          # The gitleaks action uses --exit-code=2 for leaks found, exit code 1 for errors.
          # When gitleaks encounters a scanning error (e.g., invalid git revision range on
          # synchronize events with merge commits), it exits with code 1 and produces an
          # empty SARIF report. We check the SARIF report to distinguish real leaks from
          # scanning errors, avoiding false-positive alerts.
          if [ -f results.sarif ]; then
            LEAK_COUNT=$(jq '.runs[0].results | length' results.sarif 2>/dev/null || echo "0")
            if [ "$LEAK_COUNT" -gt 0 ]; then
              echo "leaks_confirmed=true" >> "$GITHUB_OUTPUT"
              echo "::error::Gitleaks detected $LEAK_COUNT potential secret(s) in this PR"
              exit 1
            else
              echo "leaks_confirmed=false" >> "$GITHUB_OUTPUT"
              echo "::warning::Gitleaks step failed but no leaks found in SARIF report — likely a scanning error (e.g., invalid revision range). Check the gitleaks logs above for details."
            fi
          else
            echo "leaks_confirmed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Gitleaks step failed and no SARIF report was generated. Check the gitleaks logs above for details."
          fi

      - name: Comment on PR if secrets found
        if: failure() && steps.verify_leaks.outputs.leaks_confirmed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const comment = `## :warning: Secrets Detection Alert

            **Potential secrets or sensitive data have been detected in this pull request.**

            ### Action Required
            - Review the Gitleaks scan results in the workflow logs
            - Remove any hardcoded secrets, API keys, tokens, or sensitive data
            - Use environment variables or GitHub Secrets for sensitive values
            - Consider using Doppler for secret management (as per project standards)

            ### Common Issues
            - API keys and tokens
            - Database credentials
            - Slack webhook URLs
            - Private keys
            - OAuth tokens

            ### Resources
            - [Composio Secret Management Guide](https://github.com/${{ github.repository }}/blob/master/CLAUDE.md#secrets--webhooks)
            - [Gitleaks Documentation](https://github.com/gitleaks/gitleaks)

            **This PR cannot be merged until all secrets are removed.**

            cc: @${{ github.actor }}`;

            const prNumber = context.payload.pull_request?.number;
            if (prNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: comment
              });
            }

      - name: Slack Notification on Secrets Detection
        if: failure() && steps.verify_leaks.outputs.leaks_confirmed == 'true'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_TECH_WEBHOOK }}
          SLACK_CHANNEL: ${{ inputs.slack_channel }}
          SLACK_COLOR: danger
          SLACK_TITLE: ":rotating_light: Secrets Detected in PR"
          SLACK_MESSAGE: |
            Potential secrets detected in pull request!
            Repository: ${{ github.repository }}
            Branch: ${{ github.head_ref || github.ref_name }}
            Author: ${{ github.actor }}
            Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please review and remove any hardcoded secrets immediately.
          SLACK_FOOTER: "Security Alert"
          SLACK_USERNAME: "Security Bot"
